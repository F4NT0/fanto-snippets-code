# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────


# ── BUILD CONTAINER NP ───────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/deploy-jobs.yml#L1922
# Stage: build-container 

kob-build-container-np:
  extends: .build-container-image 
  variables:
    CONTAINER_TOOL: kob
    APP_NAME: $APPLICATION_NAME
    KOBACE_MANIFEST_FILE: $KOB_MF_FILE
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_NONPROD
    KOBACE_ARGS: $APP_NAME -i 1 -m 256m -c 100m
    NAMESPACE: $NAMESPACE_NONPROD
  rules:
  - *environment_rules_np
  after_script:
    - echo "Building for NON-PRODUCTION"
    - echo "Using VAULT_CONFIG_PATH = $VAULT_CONFIG_PATH"
    - echo "Using KOBACE_ARGS = $KOBACE_ARGS"
    - echo "Using NAMESPACE = $NAMESPACE"
    - echo "Using VAULT_ADDR = $VAULT_ADDR"
    - echo "Using APP_NAME = $APP_NAME"
    - echo "Using KOBACE_MANIFEST_FILE = $KOBACE_MANIFEST_FILE"

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────


# ── DEPLOY NON-PROD ──────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/deploy-jobs.yml#L1643
# Stage: deploy 

# Branches: story/xxx, develop-ge*
k8s-kobace-deploy-np:
  extends: .deploy-k8s-kobace # Location: 
  environment:
    deployment_tier: development
    name: dev
  variables:
    BLUE_APP: $APP_NAME-blue
    IS_BLUE_GREEN_DEPLOY: "true"
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_NONPROD
    KOBACE_ARGS: $APP_NAME -f $KOB_MF_FILE
    NAMESPACE: $NAMESPACE_NONPROD
  rules:
    - *environment_rules_np
  after_script: # temporary -> remember to remove
    - curl $VAULT_CLI_SH > vaultcli.sh;source vaultcli.sh $VAULT_CONFIG_PATH
    - echo $CLUSTER
    - echo $AUTH_ENDPOINT
    - echo $USERNAME
    - echo $NAMESPACE
    - echo $BLUE_APP
    - kob get-kubeconfig $CLUSTER -a $AUTH_ENDPOINT -u $USERNAME -n $NAMESPACE -p $PASSWORD -k
    - kob map-route $BLUE_APP $BLUE_APP.$KOB_DOMAIN --force

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────


# ── HEALTHCHECK NP ───────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/test-jobs.yml#L57
# Stage: validate-deploy

healthcheck:
  extends: .healthcheck
  image: $DOCKER_IMAGE
  allow_failure: false
  variables:
    HEALTH_CHECK_URL: 'https://$BLUE_APP.$KOB_DOMAIN/health/live'
  before_script:
    - |
      echo "Health check URL: $HEALTH_CHECK_URL"
  rules:
    - *environment_rules_np

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── SWITCH ROUTE NP ──────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/main/deploy-jobs.yml?ref_type=heads#L1678
# Stage: switch-route

switch-route-kobace-np:
  image: $DOCKER_IMAGE
  extends: .switch-route-k8s-kobace
  variables:
    IS_BLUE_GREEN_DEPLOY: 'true'
    NAMESPACE: $NAMESPACE_NONPROD
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_NONPROD
    KOBACE_ARGS: '$APP_NAME -f $KOB_MF_FILE'
    METADATA_FILENAME: deploy-jobs.yml
    MAP_ROUTE: $APP_NAME.$KOB_DOMAIN
  rules:
    - *environment_rules_np
  tags:
  - linux
  artifacts:
    paths:
    - log-output.txt

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── CLEANUP NP ──────────────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/main/deploy-jobs.yml?ref_type=heads#L1746
# Stage: cleanup

cleanup-kobace:
  extends: .cleanup-k8s-kobace
  variables:
    IS_BLUE_GREEN_DEPLOY: 'true'
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_NONPROD
    METADATA_FILENAME: deploy-jobs.yml
    NAMESPACE: $NAMESPACE_NONPROD
  rules:
    - *environment_rules_np
  tags:
  - linux

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── PLX NP ──────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/main/deploy-jobs.yml?ref_type=heads#L2650
# Stage: after-deploy
    
plx-integration:
  extends: .plx-integration
  stage: after-deploy
  allow_failure: false
  dependencies:
    - switch-route-kobace-np
  variables:
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_NONPROD
    CUSTOM_APP_NAME: $APPLICATION_NAME
    NAMESPACE: $NAMESPACE_NONPROD
  before_script:
    - echo "CUSTOM_APP_NAME = $CUSTOM_APP_NAME"
  rules:
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH =~ /^release./
      variables:
        ENVIRONMENT: dit
        TARGET_ENVIRONMENT: dit
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge1"
      variables:
        ENVIRONMENT: ge1
        TARGET_ENVIRONMENT: ge1
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge2"
      variables:
        ENVIRONMENT: ge2
        TARGET_ENVIRONMENT: ge2
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge3"
      variables:
        ENVIRONMENT: ge3
        TARGET_ENVIRONMENT: ge3
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge4"
      variables:
        ENVIRONMENT: ge4
        TARGET_ENVIRONMENT: ge4
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-perf"
      variables:
        ENVIRONMENT: perf
        TARGET_ENVIRONMENT: perf
    - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH =~ /^story./
      variables:
        ENVIRONMENT: dev
        TARGET_ENVIRONMENT: dev
    - if: $TARGET_ENVIRONMENT =~ /^(dev|dit|ge1|ge2|ge3|ge4|perf)$/
      variables:
        ENVIRONMENT: $TARGET_ENVIRONMENT

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── CREATE TAG ───────────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/custom-jobs.yml?ref_type=tags#L61
# Stage: create-tag
 
create-tag:
  extends: .create-tag 
  before_script:
    - echo "Starting before_script..."
    - source app_version.txt
    - echo "The App Version is $APP_VERSION"
    - export TAG="1.0.${APP_VERSION}"
  variables:
    VAULT_SECRET_PATH: kv/GITLAB
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: always

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── VERSION APP ──────────────────────────────────────────────────────────────────────────────────────────────

# Location: THIS PIPELINE 
# Stage: build

version-app:
  stage: build
  allow_failure: false
  needs: ["compile-package"]
  script:
    - |                           
      echo "Generating app version..."
      export VERSION_HASH=$(git log --no-merges -n 1 --pretty=format:"%h" origin/$CI_COMMIT_BRANCH)
      echo " Current Version from $TRIGGER_TARGET_ENVIRONMENT: $VERSION_HASH"
      echo " Current branch: $CI_COMMIT_BRANCH"                             
      echo " Project version: $VERSION_HASH"
      echo " Link to the commit: ${CI_PROJECT_URL}/-/commit/${VERSION_HASH}"
      echo " Pipeline code: $CI_PIPELINE_ID"
      echo " Pipeline URL: $CI_PIPELINE_URL"
      echo " Pipeline Source: $CI_PIPELINE_SOURCE"
      echo "APP_VERSION=${VERSION_HASH}" > app_version.txt
  artifacts:
    paths:
      - app_version.txt
  rules:
    - if: $TARGET_ENVIRONMENT !~ /^(ge1|ge2|ge3|ge4|perf|production)$/ && $CI_COMMIT_TAG == null && $CI_PIPELINE_SOURCE != 'merge_request_event'
  tags:
    - linux

