# ╭───────────────────╮
# │ .NET KOB PIPELINE │
# ╰───────────────────╯

include:
- project: devops/job-templates
  ref: v3.0.0
  file: dotnet-jobs.yml
- project: devops/job-templates
  ref: v3.0.0
  file: change-jobs.yml
- project: devops/job-templates
  ref: v3.0.0
  file: cicd-stages.yml
- project: devops/job-templates
  ref: v3.0.0
  file: security-jobs.yml
- project: devops/job-templates
  ref: v3.0.0
  file: deploy-jobs.yml
- project: devops/job-templates
  ref: v3.0.0
  file: artifactory-jobs.yml
- project: devops/cicd-constructs
  ref: v3.0.0
  file: cicd-constructs.yml
- project: devops/job-templates
  ref: v3.0.0
  file: test-jobs.yml
- project: devops/job-templates
  ref: v3.0.0
  file: custom-jobs.yml

# ── STAGES ─────────────────────────────────────────────────────────────

stages:
  - build
  - verify-build
  - build-container
  - deploy
  - deploy-prod
  - validate-deploy
  - validate-prod
  - go-live
  - switch-route
  - create-tag
  - after-deploy
  - validate-LB
  - cleanup

# ── VARIABLES ──────────────────────────────────────────────────────────

variables:
  BUILD_CSPROJ: $API_PROJ_PATH
  UNIT_TEST_PROJ: $API_TEST_PROJ_PATH
  UNIT_TEST_DIR: $UNIT_TEST_DIR
  
  TARGET: target
  UPLOAD_PATH: $UPLOAD_PATH
  UPLOAD_FILENAME: $CI_PROJECT_NAME-$CI_COMMIT_SHORT_SHA.tar.gz
  
  KOB_MF_FILE: $API_ROOT/manifest/vars-$ENVIRONMENT.yml
  APP_NAME: $APPLICATION_NAME
  BLUE_APP: $APPLICATION_NAME-blue

  # NON-PROD variables
  KOB_API_NONPROD: api-r3-np.kob.dell.com
  KOB_DOMAIN_NONPROD: r3-np.kob.dell.com

  VAULT_CONFIG_PATH_NONPROD: kv/KOB/$APP_SUB_DOMAIN/non-prod
  NAMESPACE_NONPROD: $APP_NAMESPACE-$ENVIRONMENT
  KOB_DOMAIN: dfsservicecloud
  
  # PROD variables
  KOB_API_PROD_PC1: api-p2.kob.dell.com
  KOB_API_PROD_S3B: api-s1.kob.dell.com
  KOB_DOMAIN_PC1: $DOMAIN_PC1 
  KOB_DOMAIN_S3B: $DOMAIN_S3B
  KOB_DOMAIN_LB: $DOMAIN_LB

  VAULT_CONFIG_PATH_PROD: kv/KOB/$APP_SUB_DOMAIN
  NAMESPACE_PROD: $APP_NAMESPACE

  # DELL PROXY
  PROXY: http://proxy.us.dell.com:80/

# ───────────────────────────────────────────────────────────────────────

# ── FUNCTIONS ──────────────────────────────────────────────────────────

.verify_nuget: &verify_nuget
  - |
    files=$(git ls-files)
    if echo "$files" | grep -q "Nuget.config"; then dotnet restore --configfile Nuget.config ; else echo "Nuget.config not found in the API! the main restore is happening inside the DevOps template"; fi    

.environment_rules_np: &environment_rules_np
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH =~ /^release./
    variables:
      ENVIRONMENT: dit
      TARGET_ENVIRONMENT: DIT
      KOB_DOMAIN: $DOMAIN_DIT
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge1"
    variables:
      ENVIRONMENT: ge1
      TARGET_ENVIRONMENT: ge1
      KOB_DOMAIN: $DOMAIN_GE1
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge2"
    variables:
      ENVIRONMENT: ge2
      TARGET_ENVIRONMENT: ge2
      KOB_DOMAIN: $DOMAIN_GE2
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge3"
    variables:
      ENVIRONMENT: ge3
      TARGET_ENVIRONMENT: ge3
      KOB_DOMAIN: $DOMAIN_GE3
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-ge4"
    variables:
      ENVIRONMENT: ge4
      TARGET_ENVIRONMENT: ge4
      KOB_DOMAIN: $DOMAIN_GE4
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH == "develop-perf"
    variables:
      ENVIRONMENT: perf
      TARGET_ENVIRONMENT: perf
      KOB_DOMAIN: $DOMAIN_PERF
  - if: $TARGET_ENVIRONMENT == null && $CI_COMMIT_BRANCH =~ /^story./
    variables:
      ENVIRONMENT: dev
      TARGET_ENVIRONMENT: dev
      KOB_DOMAIN: $DOMAIN_DEV
  - if: $TARGET_ENVIRONMENT =~ /^(dev|dit|ge1|ge2|ge3|ge4|perf)$/
    variables:
      ENVIRONMENT: $TARGET_ENVIRONMENT
  
.branch_check: &branch_check
  - if: '$CI_COMMIT_BRANCH =~ /^([Rr]elease).*$/ && $TARGET_ENVIRONMENT !~ /^(ge1|ge2|ge3|ge4|perf|production)$/ && $CI_COMMIT_TAG == null'
  - if: '$CI_COMMIT_BRANCH =~ /^([Ss]tory).*$/ && $TARGET_ENVIRONMENT !~ /^(ge1|ge2|ge3|ge4|perf|production)$/ && $CI_COMMIT_TAG == null'
  - if: '$CI_COMMIT_BRANCH =~ /^([Dd]evelop).*$/ && $TARGET_ENVIRONMENT !~ /^(ge1|ge2|ge3|ge4|perf|production)$/ && $CI_COMMIT_TAG == null'    

# ───────────────────────────────────────────────────────────────────────────

# ── BEFORE SCRIPT ──────────────────────────────────────────────────────────

before_script:
  - |
    echo "Current branch: $CI_COMMIT_BRANCH"
    echo "Current TRIGGER_TARGET_ENVIRONMENT: $TRIGGER_TARGET_ENVIRONMENT "
    echo "Current TARGET_ENVIRONMENT: $TARGET_ENVIRONMENT"
    echo "Current ENVIRONMENT: $ENVIRONMENT"
    echo "Current Commit tag: $CI_COMMIT_TAG"
    echo "Version App: $VERSION_APP"
    echo "Version Major: $VERSION_MAJOR"
    echo "Version Minor: $VERSION_MINOR"
    echo "CI_PIPELINE_ID: $CI_PIPELINE_ID"
  - |
    if [[ "${CI_COMMIT_TAG}" ]]
    then
      export VERSION_APP=${CI_COMMIT_TAG}
    fi
    if [[ -z "${VERSION_APP}" ]]
    then
      export VERSION_APP=${VERSION_MAJOR}.${VERSION_MINOR}.${CI_PIPELINE_ID}
      echo "Using version $VERSION_APP"
    fi
  - |
    if [[ ${TARGET_ENVIRONMENT} == "prod"* ]];
    then
      export VAULT_ROLE_ID=$PROD_VAULT_ROLE_ID
      echo "Using PROD VAULT_ROLE_ID = $VAULT_ROLE_ID"
      export VAULT_SECRET_ID=$PROD_VAULT_SECRET_ID
      echo "Using PROD VAULT_SECRET_ID = $VAULT_SECRET_ID"
      export VAULT_ADDR=$PROD_VAULT_ADDR
      echo "Using PROD VAULT_ADDR = $VAULT_ADDR"
      export UPLOAD_PATH=$PROD_UPLOAD_PATH
      echo "Using PROD UPLOAD_PATH = $UPLOAD_PATH"
    fi
# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ┌──────────────────────╮
# │ MISC ENVIRONMENT JOBS│
# └──────────────────────╯

# ── COMPILE-PACKAGE ────────────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/dotnet-jobs.yml#L31
# Stage: build

compile-package:
  extends: .compile-package-dotnetcore
  allow_failure: false
  variables:
    BUILD_CONFIGURATION: Release
  rules:
    - if: $TARGET_ENVIRONMENT !~ /^(ge1|ge2|ge3|ge4|perf|production)$/ && $CI_PIPELINE_SOURCE != 'merge_request_event'
  before_script:
    - *verify_nuget
  tags:
    - linux

# ────────────────────────────────────────────────────────────────────────────────────────────────────────────────────


# ┌──────────────────────────╮
# │ NON-PROD ENVIRONMENT JOBS│
# └──────────────────────────╯
# Branches: story/xxx, develop-ge*, release/xxx


# ── CODE QUALITY ────────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/security-jobs.yml?ref_type=tags#L593
# Stage: verify-build 

code-quality:
  extends: .code-quality 
  allow_failure: false
  image: $DOTNET_8_SDK_IMG
  variables:
    SONAR_EXCLUSIONS: '**/.xml, **/.xlsm, **/.xsd, **/.css, **/.less, **/*.scss'
    COVERAGE_FILE: $CI_PROJECT_DIR/coverage/*.xml
    SONAR_PROJECT_NAME: $CI_PROJECT_NAME
    SONAR_SLEEP: '5'
    SONAR_LANG: dotnetcore
    SONAR_RETRY: '30'
    TEST_CMD: jest --silent --collect-coverage
    SONAR_LOGIN_TOKEN: dabec5c8634097d30e57aa6aeb51cc91aa0e75f8
  rules:
    - *branch_check
  before_script:
    - *verify_nuget
# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── UNIT TEST ────────────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/dotnet-jobs.yml#L263
# Stage: verify-build 

unit-test:
  extends: .unit-test-dotnetcore 
  allow_failure: false
  image: $DOTNET_8_SDK_IMG
  variables:
    UNIT_TEST_PROJ: $API_TEST_PROJ_PATH
  rules:
    - *branch_check
  before_script:
    - *verify_nuget

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

# ── INCLUSIVE LANGUAGE ───────────────────────────────────────────────────────────────────────────────────────

# Location: TBD
