  allow_failure: false
  dependencies:
    - k8s-deploy-S3B
  only:
    refs:
      - tags
    variables:
    HEALTH_CHECK_URL: 'https://$APPLICATION_NAME-blue.$DOMAIN_S3B/health/live'
  before_script:
    - |
      echo "Health check URL: $HEALTH_CHECK_URL"

# ─────────────────────────────────────────────────────────────────────────────────────────────────────────────

  
# ── SWITCH ROUTE PROD ────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/deploy-jobs.yml#L1693
# Stage: go-live

switch-route-kobace-PC1:
  image: $DOCKER_IMAGE
  extends: .switch-route-k8s-kobace-prod  
  allow_failure: false
  when: manual
  variables:
    IS_BLUE_GREEN_DEPLOY: 'true'
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_PROD/PC1
    KOBACE_ARGS: $APP_NAME -i 2 -m 2G -c 500m -f $KOB_MF_FILE
    TARGET_K8S_OBJECTS: $KOB_MF_FILE
    METADATA_FILENAME: deploy-jobs.yml
    VAULT_ADDR: $PROD_VAULT_ADDR
    MAP_ROUTE: $APP_NAME.$KOB_DOMAIN
    NAMESPACE: $NAMESPACE_PROD
  rules:
    - *environment_rules_prod
  tags:
  - linux
  artifacts:
    paths:
    - log-output.txt

switch-route-kobace-S3B:
  image: $DOCKER_IMAGE
  extends: .switch-route-k8s-kobace-prod 
  allow_failure: false
  when: manual
  variables:
    IS_BLUE_GREEN_DEPLOY: 'true'
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_PROD/S3B
    KOBACE_ARGS: $APP_NAME -i 2 -m 2G -c 500m -f $KOB_MF_FILE
    TARGET_K8S_OBJECTS: $KOB_MF_FILE
    METADATA_FILENAME: deploy-jobs.yml
    VAULT_ADDR: $PROD_VAULT_ADDR
    MAP_ROUTE: $APP_NAME.$KOB_DOMAIN
    NAMESPACE: $NAMESPACE_PROD
  rules:
    - *environment_rules_prod
  tags:
  - linux
  artifacts:
    paths:
    - log-output.txt

