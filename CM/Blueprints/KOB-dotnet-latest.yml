# ── HEALTHCHECK PROD ────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/test-jobs.yml#L69
# Stage: validate-LB 

healthcheck-LB:
  extends: .healthcheck 
  image: $DOCKER_IMAGE
  stage: validate-prod
  allow_failure: false
  dependencies:
    - k8s-deploy-S3B
  only:
    refs:
      - tags
    variables:
    HEALTH_CHECK_URL: 'https://$APPLICATION_NAME.$DOMAIN_LB/health/live'
  before_script:
    - |
      echo "Health check URL: $HEALTH_CHECK_URL"

