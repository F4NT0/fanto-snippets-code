# ── PLX PROD ────────────────────────────────────────────────────────────────────────────────────────────

# Location: https://gitlab.dell.com/devops/job-templates/-/blob/v3.0.0/deploy-jobs.yml?ref_type=tags#L2667
# Stage: after-deploy 

plx-integration-PC1:
  extends: .plx-integration-prod
  stage: after-deploy
  when: manual
  allow_failure: false
  dependencies:
    - switch-route-kobace-PC1
  variables:
    VAULT_CONFIG_PATH: $VAULT_CONFIG_PATH_PROD/PC1
    CUSTOM_APP_NAME: $APPLICATION_NAME
    NAMESPACE: $NAMESPACE_PROD
    VAULT_ADDR: $PROD_VAULT_ADDR
  rules:
    - *environment_rules_prod
  tags:
  - linux

plx-integration-S3B:
  extends: .plx-integration-prod
  stage: after-deploy
  when: manual
  allow_failure: false
